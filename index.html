<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Student Registration</title>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: linear-gradient(270deg,#000,#0f2027,#203a43,#2c5364);
  background-size: 800% 800%;
  animation: bg 15s infinite;
}
@keyframes bg {
  0%{background-position:0%}
  50%{background-position:100%}
  100%{background-position:0%}
}

.form-box {
  position: absolute;
  top:50%; left:50%;
  transform:translate(-50%,-50%);
  background: rgba(0,0,0,0.7);
  padding:30px;
  border-radius:10px;
  color:white;
  width:300px;
  text-align:center;
}

.input {
  width:100%;
  padding:10px;
  margin:10px 0;
  border:none;
  border-bottom:1px solid gray;
  background:transparent;
  color:white;
}

.button {
  width:120px;
  height:40px;
  background:black;
  color:white;
  border:none;
  border-radius:8px;
  cursor:pointer;
}

.loader-container {
  display:none;
  position:fixed;
  inset:0;
  justify-content:center;
  align-items:center;
}
.loader {
  width:80px;
  height:80px;
  border:5px solid transparent;
  border-top:5px solid cyan;
  border-radius:50%;
  animation:spin 1s linear infinite;
}
@keyframes spin {100%{transform:rotate(360deg)}}
</style>
</head>

<body>

<div class="form-box">
  <h2>Student Registration</h2>

  <input id="firstName" class="input" placeholder="First Name">
  <input id="lastName" class="input" placeholder="Last Name">
  <input id="phone" class="input" placeholder="Phone Number">

  <button class="button" onclick="saveStudent()">Register</button>
</div>

<div class="loader-container" id="loader">
  <div class="loader"></div>
</div>

<!-- FIREBASE -->
<script>
const firebaseConfig = {
  apiKey: "AIzaSyD3JaU02rI0sMjlqB8ncbJdQ47tmhKMmss",
  authDomain: "student-system-2ed2f.firebaseapp.com",
  databaseURL: "https://student-system-2ed2f-default-rtdb.firebaseio.com",
  projectId: "student-system-2ed2f",
  storageBucket: "student-system-2ed2f.appspot.com",
  messagingSenderId: "169333624719",
  appId: "1:169333624719:web:e2299bd1f91482711545fa"
};

firebase.initializeApp(firebaseConfig);
var db = firebase.database();
</script>

<!-- SAVE FUNCTION -->
<script>
async function saveStudent() {
  const firstName = document.getElementById("firstName").value;
  const lastName = document.getElementById("lastName").value;
  const phone = document.getElementById("phone").value;

  if (!firstName || !lastName || !phone) {
    alert("Fill all fields");
    return;
  }

  document.getElementById("loader").style.display = "flex";

  const id = Date.now();

  try {
    await Promise.all([

      // Firebase
      db.ref("students/" + id).set({
        firstName,
        lastName,
        phone
      }),

      // PostgreSQL (UPDATE THIS URL AFTER DEPLOY)
      fetch("https://your-app.onrender.com/add-student", {
        method: "POST",
        headers: {
          "Content-Type": "application/json"
        },
        body: JSON.stringify({ firstName, lastName, phone })
      })

    ]);

    alert("Saved to Firebase + PostgreSQL ✅");

    document.getElementById("firstName").value = "";
    document.getElementById("lastName").value = "";
    document.getElementById("phone").value = "";

  } catch (err) {
    alert("Error: " + err.message);
  }

  document.getElementById("loader").style.display = "none";
}
</script>

</body>
</html>
